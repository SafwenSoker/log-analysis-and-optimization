<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Jenkins Log Analyser{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand fw-bold" href="/">
    <i class="bi bi-cpu me-2"></i>Log Analyser
  </a>
  <div class="ms-auto d-flex gap-2 align-items-center">
    <a href="/" class="btn btn-sm btn-outline-light"><i class="bi bi-grid me-1"></i>Dashboard</a>
    <a href="/flaky" class="btn btn-sm btn-outline-warning"><i class="bi bi-shuffle me-1"></i>Flaky Tests</a>
    <button class="btn btn-sm btn-success" id="ingestBtn">
      <i class="bi bi-cloud-download me-1"></i>Ingest Logs
    </button>
  </div>
</nav>

<div class="container-fluid py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
